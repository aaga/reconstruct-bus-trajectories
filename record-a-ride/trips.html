<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Saved Trips — Record-a-Ride</title>
  <style>
    /* Desktop-oriented (not mobile-optimized by design). */
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      color: #222; background: #fff;
      max-width: 1100px; margin: 0 auto; padding: 24px;
    }
    h1 { font-size: 22px; }
    .muted { color: #777; font-size: 13px; }
    #token-row { margin: 14px 0 22px; display: flex; gap: 8px; align-items: center; }
    #token-row input { font: inherit; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; width: 320px; }
    #token-row button { font: inherit; padding: 7px 14px; border: 1px solid #888; border-radius: 6px; background: #fff; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid #e5e5e5; vertical-align: top; }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: #666; }
    tr:hover td { background: #fafafa; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .files a { margin-right: 10px; white-space: nowrap; }
    .badge { background: #e8f0fe; color: #1a73e8; border-radius: 5px; padding: 1px 7px; font-size: 12px; font-weight: 600; }
    .rebuild { font-size: 13px; cursor: pointer; background: none; border: 1px solid #aaa; border-radius: 6px; padding: 3px 9px; }
  </style>
</head>
<body>
  <h1>Saved trips</h1>
  <p class="muted">
    Trips auto-saved by the <a href="./index.html">Record-a-Ride app</a>.
    Small files are full snapshots; <em>motion</em> is uploaded as append-only
    chunks — “combined motion CSV” stitches them back together.
  </p>
  <div id="token-row">
    <label for="token">Sync token:</label>
    <input id="token" type="password" placeholder="shared secret">
    <button id="load">Load trips</button>
  </div>
  <div id="status" class="muted"></div>
  <table id="table" hidden>
    <thead>
      <tr><th>Trip</th><th>Route / bus</th><th>Started</th><th>Observer</th><th>Files</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <script type="module" src="./trips.js"></script>
</body>
</html>
